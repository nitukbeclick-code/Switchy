name: Deploy edge functions

# Deploys Supabase edge functions straight from this repo using the Supabase
# CLI on GitHub's runners. GitHub runners have unrestricted network egress to
# api.supabase.com, unlike the sandboxed dev environment where the CLI is
# blocked by the network allow-list — so this workflow is the reliable deploy
# path (no giant inline-file uploads, the CLI reads the sources from disk).
#
# Requires one repo secret: SUPABASE_ACCESS_TOKEN
#   (create at https://supabase.com/dashboard/account/tokens, then add under
#    repo Settings -> Secrets and variables -> Actions).
#
# How to deploy:
#   • Manually: Actions tab -> "Deploy edge functions" -> Run workflow, pick a
#     function (available once this file is on the default branch).
#
# Everything in the menu deploys with --no-verify-jwt (each function does its
# own auth in code — webhook secret / requireAdmin / platform signatures).
# Deliberately ABSENT from the menu — do NOT "helpfully" add them:
#   • lead-export — the sellable-lead monetization feed behind a hard legal
#     consent gate; manual CLI deploys only, so it can never be fat-fingered
#     from a dropdown.
#   • community-admin, community-digest, rep-brief — their headers document a
#     deploy WITHOUT --no-verify-jwt, and this workflow hard-codes the flag;
#     they keep their manual CLI deploy path.
# Everything else under supabase/functions/ (except _shared and tests, which
# are libraries, not deployables) should appear both in the choices below AND
# in the "all" loop — keep the two lists in sync.

on:
  workflow_dispatch:
    inputs:
      function:
        description: Which function to deploy
        type: choice
        default: notify-lead
        options:
          - whatsapp-webhook
          - notify-lead
          - telegram-user-webhook
          - site-ai-chat
          - crm-api
          - site-subscribe
          - savings-watch
          - telegram-webhook
          - renewal-reminders
          - meeting-book
          - referral-issue
          - street-price
          - account-delete
          - analytics-track
          - admin-metrics
          - translate
          - community-moderate
          - community-notify
          - lead-digest
          - site-bill-analyzer
          - site-plan-advisor
          - site-push-notify
          - all

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: orzitfqmlvopujsoyigr

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.1

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy function(s)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under repo Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi

          # The dispatch input always carries a value (default: notify-lead);
          # the fallback is a defensive guard only.
          target="${{ github.event.inputs.function }}"
          [ -z "$target" ] && target="notify-lead"
          echo "Deploy target: $target"

          deploy_one() {
            echo "::group::deploy $1"
            supabase functions deploy "$1" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
            echo "::endgroup::"
          }

          # Keep this list identical to the dispatch choices above (minus "all").
          if [ "$target" = "all" ]; then
            for fn in whatsapp-webhook notify-lead telegram-user-webhook site-ai-chat crm-api site-subscribe savings-watch telegram-webhook renewal-reminders meeting-book referral-issue street-price account-delete analytics-track admin-metrics translate community-moderate community-notify lead-digest site-bill-analyzer site-plan-advisor site-push-notify; do
              deploy_one "$fn"
            done
          else
            deploy_one "$target"
          fi

      - name: Health check
        if: always()
        run: |
          set +e
          sleep 5
          echo "notify-lead health:"
          curl -fsS "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/notify-lead?action=health" | jq . || echo "(health probe failed or jq missing — non-fatal)"
