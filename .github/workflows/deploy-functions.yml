name: Deploy edge functions

# Deploys Supabase edge functions straight from this repo using the Supabase
# CLI on GitHub's runners. GitHub runners have unrestricted network egress to
# api.supabase.com, unlike the sandboxed dev environment where the CLI is
# blocked by the network allow-list — so this workflow is the reliable deploy
# path (no giant inline-file uploads, the CLI reads the sources from disk).
#
# Requires one repo secret: SUPABASE_ACCESS_TOKEN
#   (create at https://supabase.com/dashboard/account/tokens, then add under
#    repo Settings -> Secrets and variables -> Actions).
#
# How to deploy:
#   • Manually: Actions tab -> "Deploy edge functions" -> Run workflow, pick a
#     function (available once this file is on the default branch).
#   • By commit: push a commit whose message contains "[deploy]" to the working
#     branch; this deploys notify-lead.

on:
  workflow_dispatch:
    inputs:
      function:
        description: Which function to deploy
        type: choice
        default: notify-lead
        options:
          - whatsapp-webhook
          - notify-lead
          - telegram-user-webhook
          - site-ai-chat
          - savings-watch
          - telegram-webhook
          - renewal-reminders
          - meeting-book
          - all
  push:
    branches:
      - claude/laughing-hawking-4q1i8j

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

env:
  SUPABASE_PROJECT_REF: orzitfqmlvopujsoyigr

jobs:
  deploy:
    # On a push, only deploy when the commit message opts in with "[deploy]";
    # a manual run (workflow_dispatch) always deploys the chosen function.
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy function(s)
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN secret is not set. Add it under repo Settings -> Secrets and variables -> Actions, then re-run."
            exit 1
          fi

          # A push deploys notify-lead; a manual run uses the chosen input.
          target="${{ github.event.inputs.function }}"
          [ -z "$target" ] && target="notify-lead"
          echo "Deploy target: $target"

          deploy_one() {
            echo "::group::deploy $1"
            supabase functions deploy "$1" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
            echo "::endgroup::"
          }

          if [ "$target" = "all" ]; then
            for fn in whatsapp-webhook notify-lead telegram-user-webhook site-ai-chat savings-watch renewal-reminders telegram-webhook meeting-book; do
              deploy_one "$fn"
            done
          else
            deploy_one "$target"
          fi

      - name: Health check
        if: always()
        run: |
          set +e
          sleep 5
          echo "notify-lead health:"
          curl -fsS "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/notify-lead?action=health" | jq . || echo "(health probe failed or jq missing — non-fatal)"
