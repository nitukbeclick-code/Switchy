# Warm the translation cache and snapshot it into static /i18n bundles
# ────────────────────────────────────────────────────────────────────────────
# WHAT: translate-runtime.js loads /i18n/<lang>.json ONCE per language and applies
# from it with zero per-string model calls — a pre-warmed language switches
# near-instantly. This job keeps those bundles fresh, browser-free and
# secret-free, in ONE step:
#   • tools/warm-i18n.mjs extracts the translatable string universe straight from
#     the built site/*.html with linkedom, replicating translate-runtime.js
#     collect() EXACTLY (validated byte-exact against a real browser's collect()),
#     POSTs it to the PUBLIC translate edge function in size-bounded batches (the
#     same anon key the site ships — NO service-role key), drops verify-failed
#     echoes, and writes site/i18n/<lang>.json + web/public/i18n/<lang>.json
#     (deterministic, sorted — byte-identical to tools/export-i18n.mjs's format).
#   • If anything changed, it commits — and the host's git integration redeploys
#     the static bundles.
#
# It NEVER changes prices/numbers: the edge function masks + double-verifies those
# server-side; this job only extracts source strings and copies trusted rows out.
# Because the extraction is byte-exact with what the runtime's browser collect()
# sends, every written key is a real runtime cache hit.
#
# ── Triggers ─────────────────────────────────────────────────────────────────
#  (a) schedule — nightly (03:17 UTC): pick up strings added by the day's builds.
#  (b) workflow_dispatch — manual, with a `langs` input so a big first warm can be
#      split across runs (e.g. "en,ru,ar" one night, "fr,es,am" the next) to stay
#      under the edge fn's 40k/day model budget.
#
# ── One-time setup by the owner ──────────────────────────────────────────────
#  • Nothing required for THIS path — it uses only the PUBLIC anon key already
#    baked into the site (no SUPABASE_SERVICE_ROLE_KEY, no Playwright).
#  • The legacy browser+service-role path (scripts/prewarm-translations.mjs +
#    tools/export-i18n.mjs) still works if an owner sets SUPABASE_SERVICE_ROLE_KEY
#    and wants to warm via the deployed runtime instead.

name: Warm translations

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:
    inputs:
      langs:
        description: "Comma-separated language codes to warm (blank = the 6 core langs; 'all' = every language)."
        required: false
        default: ""

concurrency:
  group: warm-translations
  cancel-in-progress: false

permissions:
  contents: write

env:
  # Edge origin for the translate function (warm-i18n.mjs POSTs here with the baked
  # public anon key). The extraction reads the built site/*.html directly — no
  # deployed-site URL needed anymore.
  SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL || 'https://orzitfqmlvopujsoyigr.supabase.co' }}

jobs:
  warm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install linkedom
        run: npm i --no-save linkedom

      # Best-effort within a bounded budget: whatever gets translated is written
      # (additively) to the static bundles, so even a partial warm is progress.
      # continue-on-error + the script's own MAX_MINUTES guarantee the COMMIT step
      # below always runs and commits the cumulative coverage — repeat runs
      # converge to the full set. Browser-free and secret-free: extracts from the
      # built site/*.html and POSTs to the PUBLIC edge fn with the baked anon key.
      # `all` expands to every language the edge fn supports (mirrors
      # SUPPORTED_LANGS in supabase/functions/translate/lib.ts); blank = 6 core.
      - name: Warm the static /i18n bundles (browser-free, no service-role key)
        continue-on-error: true
        timeout-minutes: 310
        env:
          LANGS_INPUT: ${{ github.event.inputs.langs }}
          MAX_MINUTES: "290"
        run: |
          if [ "${LANGS_INPUT}" = "all" ]; then
            export LANGS="ar,ru,en,fr,es,am,ti,uk,ro,th,tl,hi,ne,zh,fa,ur,tr,ka,de,it,pt,pl,nl,hu,el,ja,ko"
          else
            export LANGS="${LANGS_INPUT}"
          fi
          node tools/warm-i18n.mjs

      - name: Commit refreshed bundles (redeploys the static site)
        if: always()
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A -- 'site/i18n/*.json' 'web/public/i18n/*.json'
          if git diff --cached --quiet; then
            echo "No translation changes — nothing to redeploy."
            exit 0
          fi
          git commit -m "chore(i18n): refresh static translation bundles [skip ci]

          Extracted the site string universe from site/*.html and translated it via
          the public translate edge fn → site/i18n + web/public/i18n (warm-i18n.mjs).
          No prices/numbers changed (masked + verified upstream).

          Co-Authored-By: Claude Opus 4.8 <noreply@anthropic.com>"
          git push origin "HEAD:${{ github.ref_name }}"
