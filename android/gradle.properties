# Heap for the main Gradle daemon (Kotlin compile, D8/R8, resource merge).
# NOTE: artifact-transform workers (e.g. Jetifier) run in SEPARATE worker
# processes that do NOT inherit this -Xmx — see enableJetifier below.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G -XX:+HeapDumpOnOutOfMemoryError

android.useAndroidX=true

# Jetifier is disabled on purpose. It only exists to rewrite legacy
# `android.support.*` references in dependencies to AndroidX, and this project
# has zero such dependencies (every plugin is already AndroidX). With it on,
# Gradle still registers a JetifyTransform that processes every jar/aar —
# including the large Flutter engine jar — inside a worker daemon that ignores
# the -Xmx above, which intermittently OOM'd CI ("Java heap space" while
# transforming x86_64_debug-*.jar). Turning it off removes that useless,
# flaky transform entirely. Do NOT re-enable without adding a dependency that
# genuinely needs the old support library.
android.enableJetifier=false
