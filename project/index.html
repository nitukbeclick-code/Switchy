<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>סקיצות · אפליקציית השוואת מחירים תקשורת</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600;700;800&family=Gveret+Levin&family=Caveat:wght@500;700&display=swap" rel="stylesheet" />
<style>
:root{
  --ink:#26241f;
  --ink-soft:#5b574d;
  --paper:#f4f1e8;
  --card:#fbf9f3;
  --line:#cfc9ba;
  --bar:#d7d1c2;
  --bar-d:#b9b2a0;
  --accent:#2f6f8f;
  --accent-ink:#1f4d63;
  --hand:'Gveret Levin','Caveat',cursive;
  --sans:'Assistant',system-ui,sans-serif;
  --r-wobble:255px 14px 225px 14px/14px 225px 14px 255px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--sans);
  color:var(--ink);
  background:var(--paper);
  background-image:radial-gradient(var(--line) 1px, transparent 1.4px);
  background-size:22px 22px;
  -webkit-font-smoothing:antialiased;
}
.wf-root{min-height:100vh;}

/* ---------- explorer chrome ---------- */
.ex-head{
  position:sticky;top:0;z-index:30;
  background:rgba(244,241,232,.92);
  backdrop-filter:blur(6px);
  border-bottom:2px dashed var(--line);
  padding:14px 20px 0;
}
.ex-titrow{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:2px;}
.ex-kicker{font-family:var(--hand);font-size:30px;line-height:1;color:var(--accent-ink);}
.ex-sub{font-size:13px;color:var(--ink-soft);font-weight:600;}
.ex-sub b{color:var(--ink);}
.ex-tabs{display:flex;gap:8px;overflow-x:auto;padding:12px 0 0;margin:0 -4px;}
.ex-tab{
  flex:0 0 auto;display:flex;flex-direction:column;gap:1px;align-items:flex-start;
  border:2px solid var(--ink);border-bottom:none;
  background:var(--card);
  border-radius:12px 12px 0 0;
  padding:8px 16px 12px;cursor:pointer;position:relative;top:2px;
  transition:.12s;min-width:120px;
}
.ex-tab .n{font-family:var(--hand);font-size:18px;color:var(--accent-ink);line-height:1;}
.ex-tab .t{font-size:13px;font-weight:700;color:var(--ink-soft);}
.ex-tab.on{background:var(--paper);top:0;box-shadow:0 -3px 0 var(--accent) inset;}
.ex-tab.on .t{color:var(--ink);}
.ex-tab:not(.on):hover{background:#fff;}

/* ---------- canvas ---------- */
.canvas{padding:26px 24px 90px;}
.step-head{display:flex;align-items:flex-end;gap:14px;margin:0 4px 18px;flex-wrap:wrap;}
.step-head h2{font-size:21px;margin:0;font-weight:800;letter-spacing:-.01em;}
.step-head .desc{font-size:14px;color:var(--ink-soft);font-weight:600;max-width:560px;}
.step-head .arrow{font-family:var(--hand);font-size:22px;color:var(--accent);transform:rotate(-3deg);}
.phone-row{display:flex;gap:30px;flex-wrap:wrap;align-items:flex-start;}

/* ---------- phone frame ---------- */
.phone-wrap{display:flex;flex-direction:column;gap:12px;width:300px;flex:0 0 auto;}
.phone{
  width:300px;height:632px;background:var(--card);
  border:2.5px solid var(--ink);border-radius:38px;
  padding:10px 10px 0;position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  box-shadow:7px 9px 0 rgba(38,36,31,.10);
}
.phone::before{content:"";position:absolute;top:13px;left:50%;transform:translateX(-50%);
  width:74px;height:7px;background:var(--ink);border-radius:5px;opacity:.85;}
.scr{flex:1;display:flex;flex-direction:column;overflow:hidden;border-radius:30px;}
.statusbar{display:flex;justify-content:space-between;align-items:center;
  padding:7px 18px 5px;font-size:11px;font-weight:700;color:var(--ink-soft);}
.statusbar .dots{display:flex;gap:3px;align-items:center;}
.statusbar .dots i{width:5px;height:5px;border-radius:50%;background:var(--ink-soft);display:block;}
.statusbar .dots .bat{width:16px;height:9px;border-radius:2px;border:1.5px solid var(--ink-soft);background:none;}

.caption{font-size:13px;line-height:1.45;color:var(--ink-soft);padding:0 4px;}
.caption b{font-family:var(--hand);font-size:19px;color:var(--accent-ink);display:block;}

/* ---------- app chrome inside phone ---------- */
.appbar{display:flex;align-items:center;gap:10px;padding:6px 16px 12px;}
.appbar .nav{font-size:22px;font-weight:700;color:var(--ink);width:22px;}
.appbar .h{font-weight:800;font-size:16px;flex:1;}
.appbar .act{font-family:var(--hand);font-size:17px;color:var(--accent-ink);}
.body{flex:1;overflow:hidden;padding:0 16px;display:flex;flex-direction:column;gap:12px;}
.body.scroll{overflow:hidden;}
.tabbar{display:flex;border-top:2px solid var(--ink);background:var(--card);margin-top:auto;}
.tabbar .tb{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 0 12px;color:var(--bar-d);}
.tabbar .tb .i{width:20px;height:20px;border:2px solid currentColor;border-radius:6px;}
.tabbar .tb.r .i{border-radius:50%;}
.tabbar .tb.d .i{border-radius:3px;transform:rotate(45deg);}
.tabbar .tb span{font-size:10px;font-weight:700;}
.tabbar .tb.on{color:var(--accent);}

/* ---------- wireframe primitives ---------- */
.wf-card{border:2px solid var(--ink);border-radius:var(--r-wobble);background:var(--card);padding:12px;}
.wf-card.alt{border-radius:14px 235px 14px 235px/235px 14px 235px 14px;}
.wf-card.flat{border-radius:14px;}
.wf-soft{background:rgba(207,201,186,.16);}
.wf-bar{height:9px;background:var(--bar);border-radius:5px;display:block;}
.wf-bar.d{background:var(--bar-d);}
.wf-bar.t{height:13px;}
.stack{display:flex;flex-direction:column;}
.row{display:flex;align-items:center;}
.wf-btn{display:flex;align-items:center;justify-content:center;gap:7px;
  background:var(--accent);color:#fff;border:2px solid var(--accent-ink);
  border-radius:13px;padding:11px 14px;font-weight:800;font-size:14px;text-align:center;}
.wf-btn.ghost{background:none;color:var(--accent-ink);border:2px solid var(--accent-ink);}
.wf-btn.ink{background:var(--ink);border-color:var(--ink);color:var(--card);}
.wf-btn.sm{padding:7px 12px;font-size:12.5px;border-radius:10px;}
.wf-chip{display:inline-flex;align-items:center;gap:5px;border:2px solid var(--ink);
  border-radius:20px;padding:5px 11px;font-size:12px;font-weight:700;color:var(--ink-soft);background:var(--card);}
.wf-chip.on{background:var(--accent);color:#fff;border-color:var(--accent-ink);}
.wf-chip.hl{border-style:dashed;}
.wf-img{position:relative;border:2px dashed var(--bar-d);border-radius:10px;
  background-image:repeating-linear-gradient(45deg,rgba(185,178,160,.30) 0 7px,transparent 7px 14px);
  display:flex;align-items:center;justify-content:center;}
.wf-img span{font-family:'Caveat',monospace;font-size:12px;font-weight:700;color:var(--ink-soft);
  background:var(--card);padding:1px 7px;border-radius:5px;letter-spacing:.02em;}
.ic{display:inline-flex;align-items:center;justify-content:center;
  border:2px solid var(--ink);border-radius:9px;width:34px;height:34px;flex:0 0 auto;color:var(--ink);font-size:15px;}
.ic.r{border-radius:50%;}
.ic.d{border-radius:5px;transform:rotate(45deg);}
.ic.accent{border-color:var(--accent-ink);color:var(--accent-ink);background:rgba(47,111,143,.10);}
.hl{background:linear-gradient(transparent 55%, color-mix(in oklab, var(--accent) 38%, transparent) 55%);
  padding:0 2px;font-weight:800;}
.note{font-family:var(--hand);font-size:16px;color:var(--accent-ink);line-height:1.25;
  display:flex;gap:6px;align-items:flex-start;}
.note::before{content:"↜";font-size:16px;opacity:.8;}
.note.b::before{content:"✎";}
.tag-hand{font-family:var(--hand);font-size:18px;color:var(--accent-ink);line-height:1;}
.lbl{font-weight:800;font-size:13.5px;}
.lbl-sm{font-weight:700;font-size:12px;color:var(--ink-soft);}
.muted{color:var(--ink-soft);}
.price{font-weight:800;}
.divider{height:2px;background:var(--line);border-radius:2px;border-top:1px dashed transparent;}
.star{color:var(--accent);font-size:12px;letter-spacing:1px;}

/* annotation visibility + sketch + hand toggles */
.hide-notes .note{display:none;}
.no-sketch .wf-card,.no-sketch .wf-card.alt{border-radius:14px!important;}
.no-sketch .phone{box-shadow:4px 5px 0 rgba(38,36,31,.08);}
.hand .body,.hand .appbar .h,.hand .lbl,.hand .lbl-sm,.hand .wf-btn,.hand .wf-chip{font-family:var(--hand)!important;}
.hand .wf-btn{font-size:16px;}

.legend{display:flex;gap:18px;flex-wrap:wrap;margin:0 4px 20px;font-size:12.5px;color:var(--ink-soft);font-weight:600;}
.legend .k{display:flex;align-items:center;gap:7px;}
.legend .sw{width:26px;height:14px;border-radius:4px;border:2px solid var(--ink);}
.legend .sw.bar{background:var(--bar);border:none;height:9px;}
.legend .sw.acc{background:var(--accent);border-color:var(--accent-ink);}
.legend .sw.img{border-style:dashed;background-image:repeating-linear-gradient(45deg,rgba(185,178,160,.4) 0 5px,transparent 5px 10px);}

@media (max-width:560px){
  .canvas{padding:20px 14px 90px;}
  .phone-row{gap:22px;justify-content:center;}
}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>
