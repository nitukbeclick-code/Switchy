name: chosech
description: >
  חוסך — Compare Israeli telecom plans (cellular, internet, TV, triple bundles,
  abroad) in one place. Find the best deal, calculate your savings, and switch
  providers with step-by-step porting guidance. Hebrew-first, RTL Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
