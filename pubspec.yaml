name: chosech
description: >
  חוסך — Compare Israeli telecom plans (cellular, internet, TV, triple bundles,
  abroad) in one place. Find the best deal, calculate your savings, and switch
  providers with step-by-step porting guidance. Hebrew-first, RTL Flutter app.
publish_to: 'none'
version: 1.0.15+16

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  http: ^1.6.0
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.5.0
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  pdf: ^3.11.0
  printing: ^5.13.0
  image_picker: ^1.1.2
  record: ^6.2.1
  audioplayers: ^6.1.0
  video_player: ^2.9.2
  path_provider: ^2.1.4
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0
  # Crash reporting — dark (never initialized) unless SENTRY_DSN is supplied
  # at build time via --dart-define; see main.dart. No tracing, no PII.
  sentry_flutter: ^8.9.0
  # Native Play/App Store in-app review prompt (wired in the app layer).
  in_app_review: ^2.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/providers/
    # Bundled Rubik/Assistant TTFs (+ OFL licenses). google_fonts resolves
    # these from the asset manifest instead of fetching from fonts.gstatic —
    # no FOUT on cold web loads, works offline. Runtime fetching is disabled
    # in main.dart; filenames must keep the {Family}-{Variant}.ttf convention.
    - assets/google_fonts/

# App launcher icons — generated with `dart run flutter_launcher_icons`.
# Brand: ink square + glass-white spark (same identity as site/favicon.svg);
# source art lives in tool/brand/*.svg (rendered to PNG via headless Chrome).
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  web:
    generate: true
    background_color: "#F5F7F8"
    theme_color: "#111827"
  adaptive_icon_background: "#111827"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

# Splash screen — generated with `dart run flutter_native_splash:create`:
# ink spark on glass white, matching the in-app background.
flutter_native_splash:
  color: "#F5F7F8"
  image: "assets/splash/splash.png"
  android_12:
    color: "#F5F7F8"
    image: "assets/splash/splash.png"
  web: false
