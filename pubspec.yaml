name: chosech
description: >
  חוסך — Compare Israeli telecom plans (cellular, internet, TV, triple bundles,
  abroad) in one place. Find the best deal, calculate your savings, and switch
  providers with step-by-step porting guidance. Hebrew-first, RTL Flutter app.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.2.0
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.3
  supabase_flutter: ^2.5.0
  intl: ^0.20.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  fl_chart: ^0.68.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  image_picker: ^1.1.2
  record: ^5.1.2
  audioplayers: ^6.1.0
  video_player: ^2.9.2
  path_provider: ^2.1.4
  local_auth: ^3.0.1
  flutter_secure_storage: ^10.3.1
  flutter_local_notifications: ^22.0.0
  timezone: ^0.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# App launcher icons — generated with `dart run flutter_launcher_icons`
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  android: true
  ios: true
  web:
    generate: true
    background_color: "#15603E"
    theme_color: "#15603E"
  adaptive_icon_background: "#15603E"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

# Splash screen — generated with `dart run flutter_native_splash:create`
flutter_native_splash:
  color: "#15603E"
  image: "assets/splash/splash.png"
  android_12:
    color: "#15603E"
    image: "assets/splash/splash.png"
  web: false
