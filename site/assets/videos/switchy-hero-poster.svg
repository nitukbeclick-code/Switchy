<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1408 768" role="img" aria-label="Switchy — סוכן ה-AI של חוסך">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#161c24"/>
      <stop offset="1" stop-color="#0b0f14"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="55%">
      <stop offset="0" stop-color="#16a34a" stop-opacity="0.30"/>
      <stop offset="55%" stop-color="#16a34a" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ink panel + green spotlight (reads on both light and dark page backgrounds) -->
  <rect width="1408" height="768" fill="url(#bg)"/>
  <rect width="1408" height="768" fill="url(#glow)"/>

  <!-- Switchy mascot, scaled up + centered (mirrors components/SwitchyMascot.tsx,
       re-skinned for a dark panel: light outline, bright-green signal, amber spark) -->
  <g transform="translate(522,200) scale(3.8)" fill="none" stroke-linecap="round">
    <!-- antenna + signal dot -->
    <line x1="48" y1="14" x2="48" y2="24" stroke="#e2e8f0" stroke-width="3"/>
    <circle cx="48" cy="10.5" r="4" fill="#4ade80"/>
    <!-- head -->
    <rect x="22" y="24" width="52" height="40" rx="14" fill="#1b2533" stroke="#e2e8f0" stroke-width="3"/>
    <!-- visor wash -->
    <rect x="29" y="33" width="38" height="22" rx="9" fill="#4ade80" opacity="0.14"/>
    <!-- eyes -->
    <circle cx="40" cy="44" r="4.5" fill="#4ade80"/>
    <circle cx="56" cy="44" r="4.5" fill="#4ade80"/>
    <!-- smile -->
    <path d="M40 53 Q48 58 56 53" stroke="#e2e8f0" stroke-width="2.5" fill="none"/>
    <!-- side nubs -->
    <rect x="17" y="38" width="6" height="12" rx="3" fill="#e2e8f0"/>
    <rect x="73" y="38" width="6" height="12" rx="3" fill="#e2e8f0"/>
    <!-- body -->
    <rect x="30" y="66" width="36" height="20" rx="8" fill="#1b2533" stroke="#e2e8f0" stroke-width="3"/>
    <!-- chest "switch" motif -->
    <rect x="42" y="72" width="12" height="8" rx="4" fill="#4ade80" opacity="0.95"/>
    <!-- amber signal spark -->
    <path d="M70 19 l3 6 6 3 -6 3 -3 6 -3 -6 -6 -3 6 -3 z" fill="#fbbf24"/>
  </g>
</svg>
