<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Switchy AI — השוואת מחירי סלולר, אינטרנט, טלוויזיה וחבילות בישראל, וחיסכון אמיתי.">
  <meta name="application-name" content="Switchy AI">
  <!-- Browser UI tint: brand green = ACTION. Light status bar on the glass-white background. -->
  <meta name="theme-color" content="#16A34A">

  <!-- Warm up the Google Fonts connection used by google_fonts at runtime. -->
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Open Graph -->
  <meta property="og:site_name" content="Switchy AI">
  <meta property="og:title" content="Switchy AI — משווים. חוסכים. עוברים.">
  <meta property="og:description" content="השוואת מחירי סלולר, אינטרנט, טלוויזיה וחבילות בישראל, וחיסכון אמיתי.">
  <meta property="og:locale" content="he_IL">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://switchy-ai.com/">
  <meta property="og:image" content="https://switchy-ai.com/icons/Icon-512.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Switchy AI — משווים. חוסכים. עוברים.">
  <meta name="twitter:description" content="השוואת מחירי סלולר, אינטרנט, טלוויזיה וחבילות בישראל, וחיסכון אמיתי.">
  <meta name="twitter:image" content="https://switchy-ai.com/icons/Icon-512.png">

  <!-- PWA install hints (Android / Chromium) -->
  <meta name="mobile-web-app-capable" content="yes">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Switchy">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Switchy AI</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      background: #F5F7F8;
      margin: 0;
      padding: 0;
      height: 100%;
    }
    #splash {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      background: #F5F7F8;
      transition: opacity 0.4s ease-out;
    }
    #splash.splash-hidden {
      opacity: 0;
      pointer-events: none;
    }
    #splash .splash-brand {
      color: #111827;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 56px;
      font-weight: 800;
      letter-spacing: -1px;
      line-height: 1;
    }
    #splash .splash-tagline {
      color: #4B5563;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.85;
    }
    #splash .splash-spinner {
      width: 36px;
      height: 36px;
      border: 4px solid rgba(22, 163, 74, 0.22);
      border-top-color: #16A34A;
      border-radius: 50%;
      animation: splash-spin 0.9s linear infinite;
    }
    @keyframes splash-spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="splash" role="status" aria-label="טוען את Switchy">
    <div class="splash-brand">Switchy</div>
    <div class="splash-tagline">משווים. חוסכים. עוברים.</div>
    <div class="splash-spinner"></div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (!splash) return;
      splash.classList.add('splash-hidden');
      splash.addEventListener('transitionend', function () {
        if (splash.parentNode) splash.parentNode.removeChild(splash);
      });
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
