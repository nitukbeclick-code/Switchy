<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>אופליין · Switchy AI</title>
    <meta name="robots" content="noindex" />
    <!--
      Offline fallback shell, served by the service worker when a navigation
      fails with no network. Standalone document (the SW serves it raw from
      /public, outside Next's CSS pipeline), so styles are inlined and mirror the
      brand tokens: glass-white bg, ink text, green accent. It supports light AND
      dark via prefers-color-scheme so it matches the rest of the PWA.
    -->
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f5f7f8;
        --surface: #ffffff;
        --ink: #0b0f14;
        --muted: #5b616b;
        --border: #e5e7eb;
        --accent: #16a34a;
        --accent-contrast: #ffffff;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #11161c;
          --surface: #161c24;
          --ink: #e8ebef;
          --muted: #aeb6c2;
          --border: #2a3340;
          --accent: #4ade80;
          --accent-contrast: #0b2a18;
        }
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; margin: 0; }
      body {
        font-family: "Assistant", system-ui, -apple-system, "Segoe UI", Arial, sans-serif;
        background: var(--bg);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        max-width: 420px;
        width: 100%;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px 28px;
        box-shadow: 0 2px 8px rgba(11, 15, 20, 0.05);
      }
      .mark {
        width: 56px;
        height: 56px;
        margin: 0 auto 16px;
        border-radius: 50%;
        background: color-mix(in srgb, var(--accent) 15%, transparent);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
      }
      h1 { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
      p { font-size: 15px; line-height: 1.6; color: var(--muted); margin: 0 0 20px; }
      button {
        font: inherit;
        font-weight: 600;
        cursor: pointer;
        border: none;
        border-radius: 12px;
        padding: 12px 20px;
        background: var(--accent);
        color: var(--accent-contrast);
        transition: opacity 0.15s ease;
      }
      button:hover { opacity: 0.9; }
      button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="mark" aria-hidden="true">⚡</div>
      <h1>אין חיבור לאינטרנט</h1>
      <p>
        נראה שאתם במצב לא מקוון. בדקו את החיבור ונסו שוב — המחירים וההשוואות שלנו
        מתעדכנים בזמן אמת, אז כדאי להתחבר לרשת.
      </p>
      <button type="button" onclick="location.reload()">נסו שוב</button>
    </main>
  </body>
</html>
